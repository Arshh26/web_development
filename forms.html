<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Forms</title>
  </head>
  <body>
    <table>
      <h1 align="center">Students Registration Form</h1>
      <tr>
        <td><label>Student Rollno</label></td>
        <td><input type="text" /></td>
      </tr>
      <tr>
        <td><label>Father Name</label></td>
        <td><input type="text" /></td>
      </tr>
      <tr>
        <td><label>Date of Birth</label></td>
        <td><input type="date" /></td>
      </tr>
      <tr>
        <td><label>Mobile Number</label></td>
        <td><input type="number" /></td>
      </tr>
      <tr>
        <td><label>Email Id</label></td>
        <td><input type="email" /></td>
      </tr>
      <tr>
        <td>Gender</td>
        <td><input type="radio" name="gender" />male
        <input type="radio" name="gender" />female</td>
      </tr>
      <tr>
        <td><label>Department</label></td>
        <td><input type="checkbox" type="Department" />CSE
        <input type="checkbox" type="Department" />EEE
        <input type="checkbox" type="Department" />ECE</td>
      </tr>
      <tr>
        <td><label>Course</label></td>
        <td>
          <select>
            <option>...Select Your Course...</option>
            <option>Java</option>
            <option>Python</option>
          </select>
        </td>
        <tr>
        <td><label>Select Photo</label></td>
        <td><input type="file" /></td>
       </tr>
       <tr>
        <td><label>City</label></td>
        <td><input type="text" /></td>
      </tr>
      <tr>
        <td><label>Address</label></td>
        <td><textarea rows="4" cols="20"
          ></textarea></td>
      </tr>
      <tr>
        <td><label></label></td>
        <td><input type="submit" /></td>
      </tr>
      
        </td>
      </tr>
    </table>
  </body>
</html>
